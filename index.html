        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">
                지능형 한자-한글 상호 변환기
            </h1>
            <p class="text-slate-500 text-sm">
                두 가지 이상의 음을 가진 한자(다음자)가 나타나면 노란색으로 표시되며, 클릭하여 직접 알맞은 음을 고를 수 있습니다.
            </p>
        </div>

        <div class="flex justify-center mb-8">
            <button id="toggleBtn" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-full shadow-md transition-all active:scale-95 cursor-pointer">
                <i data-lucide="arrow-left-right" class="w-4 h-4"></i>
                <span id="modeStatus">한자 ➔ 한글</span>
            </button>
        </div>

        <div class="mb-8">
            <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center hover:bg-slate-50 hover:border-blue-400 transition-all cursor-pointer group">
                <input type="file" id="fileInput" accept=".docx,.txt" class="hidden">
                <i data-lucide="upload" class="mx-auto mb-2 text-slate-400 group-hover:text-blue-500 transition-colors w-9 h-9"></i>
                <p class="text-sm font-semibold text-slate-700">클릭하여 문서 파일 업로드 (.txt, .docx)</p>
                <div id="fileInfo" class="mt-3 hidden inline-flex items-center gap-1.5 px-3 py-1 bg-green-50 text-green-700 rounded-full text-xs font-medium">
                    <i data-lucide="file-text" class="w-3.5 h-3.5"></i> <span id="fileNameDisplay"></span>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="flex flex-col">
                <label class="text-sm font-bold text-slate-700 mb-2 flex justify-between items-center">
                    <span id="inputLabel">원본 한자 입력</span>
                    <button id="clearBtn" class="text-xs font-normal text-slate-400 hover:text-rose-500 flex items-center gap-1 cursor-pointer">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> 비우기
                    </button>
                </label>
                <textarea id="inputText" placeholder="여기에 텍스트를 입력하거나 문서를 업로드 하세요..." class="w-full h-80 p-4 border border-slate-200 rounded-xl font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-slate-50/50 resize-none"></textarea>
            </div>

            <div class="flex flex-col">
                <div class="text-sm font-bold text-slate-700 mb-2 flex justify-between items-center">
                    <span>실시간 변환 및 독음 선택 결과</span>
                    <div class="flex gap-2">
                        <button id="copyBtn" disabled class="text-xs bg-slate-100 hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed text-slate-700 font-medium px-3 py-1 rounded-md flex items-center gap-1 cursor-pointer">
                            <i data-lucide="copy" class="w-3 h-3"></i> 복사
                        </button>
                        <button id="downloadBtn" disabled class="text-xs bg-slate-100 hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed text-slate-700 font-medium px-3 py-1 rounded-md flex items-center gap-1 cursor-pointer">
                            <i data-lucide="download" class="w-3 h-3"></i> 다운로드
                        </button>
                    </div>
                </div>
                
                <div id="outputArea" class="w-full h-80 p-4 border border-slate-200 rounded-xl font-mono text-sm bg-slate-50 overflow-y-auto whitespace-pre-wrap leading-relaxed select-text">
                    <span class="text-slate-400">텍스트를 입력하시면 변환 결과가 실시간으로 나타납니다.</span>
                </div>
            </div>
        </div>

        <div class="mt-6 bg-amber-50 rounded-xl p-4 border border-amber-200 text-xs text-amber-800">
            <strong>💡 다음자 선택 팁:</strong> 변환 결과 본문 중 <span class="bg-amber-200 px-1 rounded font-bold">노란색 버블</span>로 감싸진 글자들은 두 개 이상의 독음을 가진 글자입니다. 클릭을 통해 문맥에 맞는 올바른 소리로 변경할 수 있으며, 최종 수정본 상태 그대로 복사 및 다운로드가 가능합니다.
        </div>

            '회': '會回悔繪', '획': '獲劃', '효': '孝效曉', '후': '後候厚侯', '훈': '訓', '훼': '毁',
            '휘': '揮輝', '휴': '休携', '흉': '凶胸'
        };

        const COMPILED_HANJA_MAP = {};
        Object.entries(HANJA_DICT).forEach(([hangul, hanjaStr]) => {
            for (let char of hanjaStr) {
                COMPILED_HANJA_MAP[char] = hangul;
            }
        });

        // 상태 관리 변수
        let conversionMode = 'hanja-to-hangul'; // 'hanja-to-hangul' | 'hangul-to-hanja'
        let structuredResults = [];
        let currentFileName = '';

        // DOM 요소 캐싱
        const toggleBtn = document.getElementById('toggleBtn');
        const modeStatus = document.getElementById('modeStatus');
        const inputLabel = document.getElementById('inputLabel');
        const inputText = document.getElementById('inputText');
        const outputArea = document.getElementById('outputArea');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        // 초기화 아이콘 렌더링
        lucide.createIcons();

        // 모드 전환
        toggleBtn.addEventListener('click', () => {
            conversionMode = (conversionMode === 'hanja-to-hangul') ? 'hangul-to-ja' : 'hanja-to-hangul';
            modeStatus.textContent = (conversionMode === 'hanja-to-hangul') ? '한자 ➔ 한글' : '한글 ➔ 한자';
            inputLabel.textContent = (conversionMode === 'hanja-to-hangul') ? '원본 한자 입력' : '원본 한글 입력';
            processConversion();
        });

        // 텍스트 실시간 변환 추적
        inputText.addEventListener('input', processConversion);

        // 변환 프로세스 핵심 로직
        function processConversion() {
            const text = inputText.value;
            if (!text) {
                structuredResults = [];
                outputArea.innerHTML = '<span class="text-slate-400">텍스트를 입력하시면 변환 결과가 실시간으로 나타납니다.</span>';
                copyBtn.disabled = true;
                downloadBtn.disabled = true;
                return;
            }

            structuredResults = [];

            if (conversionMode === 'hanja-to-hangul') {
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (/[\u4e00-\u9fff]/.test(char)) {
                        if (MULTI_HANJA_DICT[char]) {
                            structuredResults.push({
                                id: `hanja-${i}-${char}`,
                                type: 'multi',
                                origin: char,
                                selectedReading: MULTI_HANJA_DICT[char][0],
                                options: MULTI_HANJA_DICT[char]
                            });
                        } else {
                            structuredResults.push({
                                id: `hanja-${i}-${char}`,
                                type: 'normal',
                                origin: char,
                                selectedReading: COMPILED_HANJA_MAP[char] || char
                            });
                        }
                    } else {
                        structuredResults.push({
                            id: `text-${i}`,
                            type: 'plain',
                            origin: char,
                            selectedReading: char
                        });
                    }
                }
            } else {
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (/[\uac00-\ud7a3]/.test(char)) {
                        const targetHanjaList = HANJA_DICT[char];
                        structuredResults.push({
                            id: `hangul-${i}-${char}`,
                            type: 'normal',
                            origin: char,
                            selectedReading: targetHanjaList ? targetHanjaList[0] : char
                        });
                    } else {
                        structuredResults.push({
                            id: `text-${i}`,
                            type: 'plain',
                            origin: char,
                            selectedReading: char
                        });
                    }
                }
            }

            renderOutput();
            copyBtn.disabled = false;
            downloadBtn.disabled = false;
        }

        // 결과창 HTML 렌더링
        function renderOutput() {
            outputArea.innerHTML = '';
            
            structuredResults.forEach((item) => {
                if (item.type === 'multi') {
                    const wrapper = document.createElement('span');
                    wrapper.className = 'inline-block mx-0.5 relative group';

                    const select = document.createElement('select');
                    select.className = 'bg-amber-100 hover:bg-amber-200 text-amber-900 border border-amber-300 rounded px-1 text-xs font-bold cursor-pointer transition-colors focus:outline-none focus:ring-2 focus:ring-amber-500 appearance-none text-center min-w-[2rem]';
                    select.title = `원문 한자: ${item.origin}`;

                    item.options.forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.textContent = opt;
                        if (opt === item.selectedReading) option.selected = true;
                        select.appendChild(option);
                    });

                    // 선택 변경 핸들러
                    select.addEventListener('change', (e) => {
                        item.selectedReading = e.target.value;
                    });

                    const tooltip = document.createElement('span');
                    tooltip.className = 'absolute bottom-full left-1/2 transform -translate-x-1/2 mb-1 hidden group-hover:block bg-slate-800 text-white text-[10px] px-1.5 py-0.5 rounded shadow pointer-events-none z-10';
                    tooltip.textContent = item.origin;

                    wrapper.appendChild(select);
                    wrapper.appendChild(tooltip);
                    outputArea.appendChild(wrapper);
                } else {
                    const textNode = document.createTextNode(item.selectedReading);
                    outputArea.appendChild(textNode);
                }
            });
        }

        // 최종 문자열 조립
        function getFinalText() {
            return structuredResults.map(item => item.selectedReading).join('');
        }

        // 클립보드 복사
        copyBtn.addEventListener('click', async () => {
            const text = getFinalText();
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                alert('클립보드에 바르게 복사되었습니다.');
            } catch (err) {
                alert('클립보드 복사에 실패했습니다.');
            }
        });

        // 파일 다운로드
        downloadBtn.addEventListener('click', () => {
            const text = getFinalText();
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `converted_${currentFileName || 'document'}.txt`;
            link.click();
            URL.revokeObjectURL(url);
        });

        // 데이터 비우기
        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            currentFileName = '';
            fileInfo.classList.add('hidden');
            processConversion();
        });

        // 파일 업로드 이벤트 연결
        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            currentFileName = file.name;
            fileNameDisplay.textContent = file.name;
            fileInfo.classList.remove('hidden');

            try {
                const fileExtension = file.name.split('.').pop().toLowerCase();
                let extractedText = '';

                if (fileExtension === 'txt') {
                    extractedText = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.onerror = reject;
                        reader.readAsText(file, 'utf-8');
                    });
                } else if (fileExtension === 'docx') {
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                    extractedText = result.value;
                } else {
                    throw new Error('지원하지 않는 포맷입니다. TXT 혹은 DOCX 파일만 제공해 주세요.');
                }

                inputText.value = extractedText;
                processConversion();
            } catch (error) {
                alert(`파일 읽기 실패: ${error.message}`);
                currentFileName = '';
                fileInfo.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
